<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ler Excel com formatação</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <style>
        table { border-collapse: collapse; margin-bottom: 30px; }
        td, th { border: 1px solid #000; padding: 4px; cursor: pointer; }
        th { font-weight: bold; }

        button { margin-right: 6px; margin-bottom: 10px; }

        .selected-row { background-color: #fff3a0; }
        .hidden-row { display: none !important; }

        #toast {
            position: fixed;
            bottom:20px;
            right:20px;
            background:#333;
            color:#fff;
            padding:6px 12px;
            border-radius:4px;
            font-size:13px;
            opacity:0;
            transition: opacity 0.3s;
            pointer-events:none;
        }
        #toast.show { opacity:0.9; }

        .format-btn.active {
            background-color: #4CAF50;
            color: white;
        }

        .excel-col-letters {
            background-color: #bdd7ee;
            color: #555;
            font-weight: 500;
        }

        .excel-header {
            background-color: #bdd7ee;
            font-weight: bold;
        }

        #btnSaveExcel {
            background-color: #217346;
            color: white;
            border: none;
            padding: 8px 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        #btnSaveExcel:hover {
            background-color: #1a5c38;
        }
    </style>
</head>

<body>

<h2>Ler Excel (dados brutos + letras das colunas)</h2>

<input type="file" id="inputExcel" accept=".xlsx, .xls"><br><br>

<div style="margin-bottom: 15px;">
    <button id="btnDate" class="format-btn">Formato Data</button>
    <button id="btnValue" class="format-btn">Formato Valor</button>
    <button id="btnOriginal" class="format-btn">Original</button>
</div>

<div style="margin-bottom: 15px;">
    <button id="btnFilterSelected">Selecionadas</button>
    <button id="btnFilterNotSelected">Não Selecionadas</button>
    <button id="btnFilterAll">Todas</button>
    <button id="btnClearSelection">Limpar Seleções</button>
</div>

<!-- BUSCA -->
<div style="margin-bottom:15px;">
    <strong>Busca:</strong>
    <input type="text" id="searchValue" placeholder="Digite para buscar..." style="width:220px;">
    <input type="text" id="searchColumn" placeholder="Coluna (A, B, C)" style="width:120px;">
</div>

<div style="margin-bottom:10px;">
    <label>
        <input type="radio" name="searchMode" value="contains" checked> Contém
    </label>
    <label style="margin-left:10px;">
        <input type="radio" name="searchMode" value="exact"> Exata
    </label>
</div>

<div style="margin-bottom: 20px;">
    <button id="btnSaveExcel">Salvar Excel</button>
</div>

<div id="output"></div>
<div id="toast">Copiado</div>

<script>
let currentFormat = null;
let originalFileName = "planilha.xlsx";

function showToast() {
    const toast = document.getElementById("toast");
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 1200);
}

function columnToLetter(n) {
    let s = "";
    while (n >= 0) {
        s = String.fromCharCode((n % 26) + 65) + s;
        n = Math.floor(n / 26) - 1;
    }
    return s;
}

function excelDateToDDMMYYYY(v) {
    if (!isNaN(v) && v > 0 && v < 60000) {
        const b = new Date(Date.UTC(1899, 11, 30));
        const d = new Date(b.getTime() + v * 86400000);
        return `${String(d.getUTCDate()).padStart(2,"0")}/${String(d.getUTCMonth()+1).padStart(2,"0")}/${d.getUTCFullYear()}`;
    }
    return v;
}

function formatValue(v) {
    const n = parseFloat(v);
    return isNaN(n) ? v : n.toLocaleString("pt-BR", { minimumFractionDigits: 2 });
}

/* NORMALIZAÇÃO – NÃO QUEBRA NADA */
function normalizeValue(v) {
    if (v === null || v === undefined) return "";
    return String(v).toLowerCase().trim();
}

const btnDate = document.getElementById("btnDate");
const btnValue = document.getElementById("btnValue");
const btnOriginal = document.getElementById("btnOriginal");
const formatButtons = [btnDate, btnValue, btnOriginal];

function setFormat(format) {
    if (currentFormat === format) {
        currentFormat = null;
        formatButtons.forEach(b => b.classList.remove("active"));
    } else {
        currentFormat = format;
        formatButtons.forEach(b => {
            b.classList.toggle("active", b.id === "btn" + format.charAt(0).toUpperCase() + format.slice(1));
        });
    }
}

btnDate.onclick = () => setFormat("date");
btnValue.onclick = () => setFormat("value");
btnOriginal.onclick = () => setFormat("original");

btnFilterSelected.onclick = () => {
    document.querySelectorAll("table tr").forEach((tr, index) => {
        if (index < 2) return;
        tr.classList.toggle("hidden-row", !tr.classList.contains("selected-row"));
    });
};

btnFilterNotSelected.onclick = () => {
    document.querySelectorAll("table tr").forEach((tr, index) => {
        if (index < 2) return;
        tr.classList.toggle("hidden-row", tr.classList.contains("selected-row"));
    });
};

btnFilterAll.onclick = () => {
    document.querySelectorAll("table tr").forEach((tr, index) => {
        if (index < 2) return;
        tr.classList.remove("hidden-row");
    });
};

btnClearSelection.onclick = () => {
    document.querySelectorAll(".selected-row").forEach(tr => tr.classList.remove("selected-row"));
    btnFilterAll.onclick();
};

/* 🔍 BUSCA SIMPLES – CONTÉM / EXATA */
function applySearch() {
    const value = normalizeValue(document.getElementById("searchValue").value);
    const colInput = document.getElementById("searchColumn").value.trim().toUpperCase();
    const mode = document.querySelector('input[name="searchMode"]:checked').value;

    if (!value) {
        document.querySelectorAll("tr.hidden-row").forEach(tr => tr.classList.remove("hidden-row"));
        return;
    }

    document.querySelectorAll("#output table").forEach(table => {
        table.querySelectorAll("tr").forEach((tr, index) => {
            if (index < 2) return;

            let match = false;

            tr.querySelectorAll("td").forEach((td, colIndex) => {
                if (colInput && columnToLetter(colIndex) !== colInput) return;

                const cell = normalizeValue(td.dataset.original);

                if (mode === "exact") {
                    if (cell === value) match = true;
                } else {
                    if (cell.includes(value)) match = true;
                }
            });

            tr.classList.toggle("hidden-row", !match);
        });
    });
}

document.getElementById("searchValue").addEventListener("input", applySearch);
document.getElementById("searchColumn").addEventListener("input", applySearch);
document.querySelectorAll('input[name="searchMode"]').forEach(r =>
    r.addEventListener("change", applySearch)
);

/* SALVAR EXCEL */
document.getElementById("btnSaveExcel").onclick = () => {
    const tables = document.querySelectorAll("#output table");
    if (tables.length === 0) return alert("Nenhuma tabela para salvar!");

    const wb = XLSX.utils.book_new();

    tables.forEach((table, sheetIndex) => {
        const ws_data = [];
        const rows = table.querySelectorAll("tr");

        ws_data.push([...rows[1].querySelectorAll("td")].map(td => td.dataset.original));

        for (let i = 2; i < rows.length; i++) {
            const tr = rows[i];
            if (tr.classList.contains("hidden-row")) continue;
            const row = [...tr.querySelectorAll("td")].map(td => td.dataset.original);
            if (row.some(v => String(v).trim() !== "")) ws_data.push(row);
        }

        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(ws_data), "Planilha " + (sheetIndex + 1));
    });

    XLSX.writeFile(wb, originalFileName);
};

/* LEITURA DO EXCEL */
document.getElementById("inputExcel").addEventListener("change", function (e) {
    const file = e.target.files[0];
    if (!file) return;
    originalFileName = file.name;

    const reader = new FileReader();
    reader.onload = e => {
        const workbook = XLSX.read(new Uint8Array(e.target.result), { type: "array" });
        let html = "";

        workbook.SheetNames.forEach(name => {
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[name], { header: 1, raw: true, defval: "" });
            const maxCols = Math.max(...rows.map(r => r.length));

            html += '<table><tr class="excel-col-letters">';
            for (let c = 0; c < maxCols; c++) html += `<th data-col="${c}">${columnToLetter(c)}</th>`;
            html += "</tr>";

            rows.forEach((row, i) => {
                html += `<tr ${i===0?'class="excel-header"':''}>`;
                for (let c = 0; c < maxCols; c++) {
                    const v = row[c] ?? "";
                    html += `<td data-col="${c}" data-original="${v}">${v}</td>`;
                }
                html += "</tr>";
            });

            html += "</table><hr>";
        });

        document.getElementById("output").innerHTML = html;

        document.querySelectorAll("td, th").forEach(cell => {
            cell.onclick = e => {
                if (e.ctrlKey && cell.tagName === "TD") {
                    cell.parentElement.classList.toggle("selected-row");
                    return;
                }
                if (!currentFormat) return;
                const col = cell.dataset.col;
                cell.closest("table").querySelectorAll(`td[data-col="${col}"]`)
                    .forEach(td => {
                        const o = td.dataset.original;
                        if (currentFormat === "date") td.textContent = excelDateToDDMMYYYY(o);
                        if (currentFormat === "value") td.textContent = formatValue(o);
                        if (currentFormat === "original") td.textContent = o;
                    });
            };

            cell.ondblclick = () => {
                if (cell.tagName !== "TD") return;
                const t = document.createElement("textarea");
                t.value = cell.textContent;
                document.body.appendChild(t);
                t.select();
                document.execCommand("copy");
                document.body.removeChild(t);
                showToast();
            };
        });
    };
    reader.readAsArrayBuffer(file);
    this.value = "";
});
</script>

</body>
</html>
